<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <!-- Background pattern -->
  <circle cx="100" cy="100" r="60" fill="rgba(255,255,255,0.05)"/>
  <circle cx="412" cy="412" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="400" cy="100" r="40" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="400" r="50" fill="rgba(255,255,255,0.03)"/>
  <!-- Code brackets -->
  <text x="120" y="220" font-family="'Courier New', monospace" font-size="70" fill="rgba(255,255,255,0.15)" text-anchor="middle">&lt;/&gt;</text>
  <!-- Q letter -->
  <text x="256" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="280" font-weight="800" fill="url(#textGrad)" text-anchor="middle">Q</text>
  <!-- Small decorative dot -->
  <circle cx="340" cy="180" r="12" fill="#a78bfa" opacity="0.4"/>
  <circle cx="160" cy="340" r="8" fill="#60a5fa" opacity="0.3"/>
</svg>